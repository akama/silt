name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rust_target: x86_64-unknown-linux-musl
            ocaml_options: "ocaml-option-musl,ocaml-option-static"
          - os: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-musl
            ocaml_options: "ocaml-option-musl,ocaml-option-static"
          - os: macos-latest
            rust_target: aarch64-apple-darwin
            ocaml_options: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install musl toolchain (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/silt_embed/target
          key: rust-${{ matrix.rust_target }}-${{ hashFiles('rust/silt_embed/Cargo.lock') }}
          restore-keys: rust-${{ matrix.rust_target }}-

      - name: Download model
        run: bash rust/silt_embed/download_model.sh

      - name: Build and test Rust
        working-directory: rust/silt_embed
        run: |
          cargo build --release --target ${{ matrix.rust_target }}
          cargo test --release

      - name: Install OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.3"
          opam-local-packages: ""

      - name: Install OCaml compiler options (Linux)
        if: matrix.ocaml_options != ''
        run: opam install ${{ matrix.ocaml_options }} --yes

      - name: Install OCaml deps
        run: opam install . --deps-only --yes

      - name: Build OCaml
        run: opam exec -- env SILT_RUST_TARGET=${{ matrix.rust_target }} dune build

      - name: Test OCaml
        run: opam exec -- env SILT_RUST_TARGET=${{ matrix.rust_target }} dune runtest

      - name: Verify static linking (Linux)
        if: runner.os == 'Linux'
        run: |
          ldd _build/default/bin/main.exe 2>&1 | grep -q "not a dynamic executable"
          echo "Binary is fully static"
