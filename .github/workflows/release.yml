name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rust_target: x86_64-unknown-linux-musl
            ocaml_compiler: "ocaml-variants.5.3.0+options,ocaml-option-musl,ocaml-option-static"
            artifact: silt-linux-x86_64
          - os: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-musl
            ocaml_compiler: "ocaml-variants.5.3.0+options,ocaml-option-musl,ocaml-option-static"
            artifact: silt-linux-aarch64
          - os: macos-latest
            rust_target: aarch64-apple-darwin
            ocaml_compiler: "5.3"
            artifact: silt-macos-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install musl toolchain (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/silt_embed/target
          key: rust-release-${{ matrix.rust_target }}-${{ hashFiles('rust/silt_embed/Cargo.lock') }}
          restore-keys: rust-release-${{ matrix.rust_target }}-

      - name: Download model
        run: bash rust/silt_embed/download_model.sh

      - name: Build Rust
        working-directory: rust/silt_embed
        run: cargo build --release --target ${{ matrix.rust_target }}

      - name: Install OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ matrix.ocaml_compiler }}
          opam-local-packages: ""

      - name: Install OCaml deps
        run: opam install . --deps-only --yes

      - name: Build OCaml
        run: opam exec -- env SILT_RUST_TARGET=${{ matrix.rust_target }} dune build

      - name: Test
        run: |
          cd rust/silt_embed && cargo test --release && cd ../..
          opam exec -- env SILT_RUST_TARGET=${{ matrix.rust_target }} dune runtest

      - name: Verify static linking (Linux)
        if: runner.os == 'Linux'
        run: |
          ldd _build/default/bin/main.exe 2>&1 | grep -q "not a dynamic executable"
          echo "Binary is fully static"

      - name: Package binary
        run: |
          mkdir -p dist
          cp _build/default/bin/main.exe dist/silt
          chmod +x dist/silt
          tar czf ${{ matrix.artifact }}.tar.gz -C dist silt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ github.run_number }}"

          # Collect all tarballs
          mkdir -p release
          find artifacts -name '*.tar.gz' -exec cp {} release/ \;

          # Generate checksums
          cd release
          sha256sum *.tar.gz > SHA256SUMS
          cd ..

          # Create release
          gh release create "${TAG}" \
            --title "silt ${TAG}" \
            --generate-notes \
            release/*
