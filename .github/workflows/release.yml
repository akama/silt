name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: silt-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: silt-macos-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/silt_embed/target
          key: rust-${{ matrix.target }}-${{ hashFiles('rust/silt_embed/Cargo.lock') }}
          restore-keys: rust-${{ matrix.target }}-

      - name: Download model
        run: bash rust/silt_embed/download_model.sh

      - name: Build Rust
        working-directory: rust/silt_embed
        run: cargo build --release

      - name: Install OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.3"

      - name: Install OCaml deps
        run: opam install . --deps-only --yes

      - name: Build OCaml
        run: opam exec -- dune build

      - name: Test
        run: |
          cd rust/silt_embed && cargo test --release && cd ../..
          opam exec -- dune runtest

      - name: Package binary
        run: |
          mkdir -p dist
          cp _build/default/bin/main.exe dist/silt
          chmod +x dist/silt
          tar czf ${{ matrix.artifact }}.tar.gz -C dist silt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="0.1.${{ github.run_number }}"
          TAG="v${VERSION}"

          # Collect all tarballs
          mkdir -p release
          find artifacts -name '*.tar.gz' -exec cp {} release/ \;

          # Generate checksums
          cd release
          sha256sum *.tar.gz > SHA256SUMS
          cd ..

          # Create release
          gh release create "${TAG}" \
            --title "silt ${VERSION}" \
            --generate-notes \
            release/*
